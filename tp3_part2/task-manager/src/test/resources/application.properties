# ============================================================
# Test Application Properties
# These are overridden at runtime by Testcontainers initializers
# ============================================================

# Datasource – overridden dynamically by @ClassRule MySQLContainer
spring.datasource.url=jdbc:mysql://localhost:3306/testdb
spring.datasource.username=testuser
spring.datasource.password=testpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable H2 console during integration tests
spring.h2.console.enabled=false

# Default admin seed data (used by DataLoader)
default.admin.mail=admin@mail.com
default.admin.name=admin
default.admin.password=112233
default.admin.image=images/admin.png

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
